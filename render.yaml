services:
  - type: web
    name: smartagri-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartagri-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MAPPLS_REST_KEY
        sync: false
      - key: MAPPLS_CLIENT_ID
        sync: false
      - key: MAPPLS_CLIENT_SECRET
        sync: false
      - key: WEATHERAPI_KEY
        sync: false

databases:
  - name: smartagri-db
    plan: free
    databaseName: smartagri
    user: smartagri
